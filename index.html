<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./img/beemo.svg" type="image/x-icon"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300&family=Roboto:wght@100&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Time</title>
</head>
<body>
    <header>
        <section class="wrap">
            <div class="container">
                <figure class="toggle-menu">
                    <img src="./img/togglle-black.png" alt="toggle-menu">
                </figure>
                <figure class="fig-logo">
                    <img src="./img/HA-logo.png" alt="bob-logo">
                </figure>
                <nav class="navigation">
                    <ul class="header-ul">
                        <li>
                            <a href="#">Home</a>
                        </li>
                        <li>
                            <a href="#">Sobre</a>
                        </li>
                        <li>
                            <a href="#">Contato</a>
                        </li>
                    </ul>
                    <form action="#">
                        <input type="text" placeholder="Buscar">
                    </form>
                </nav>
            </div>
        </section>
    </header>
    <main>
        <section class="img-fundo">
            <div class="characters">
                <h1>Finn</h1>
                <nav>
                    <ul class="list-friend">
                        <li><a href="#">Jake</a></li>
                        <li><a href="#">Princesa Jujuba</a></li>
                        <li><a href="#">Marceline</a></li>
                        <li><a href="#">Rei Gelado</a></li>
                    </ul>
                </nav>
            </div>
        </section>
        <section class="profile">
            <div class="container2">
                <div class="text-box">
                    <h2>Histórias de Finn e Jake</h2>
                    <div class="line"></div>
                </div>             
                <div class="photos">
                    <div>
                        <figure class="jake">
                            <div class="information">
                                <h3>Jake o cão</h3>
                                <p>Melhor amigo do Finn.</p>
                            </div>
                            <img src="./img/jake.png" alt="Jake">
                        </figure>
                        <button>Saiba mais</button>
                    </div>
                    <div>
                        <figure class="jujuba">
                            <div class="information">
                                <h3>Princesa Jujuba</h3>
                                 <p>Governante do Reino Doce.</p>
                            </div>
                            <img src="./img/princesa-jujuba.png" alt="Princesa Jujuba">
                        </figure>
                        <button>Saiba mais</button>
                    </div>
                    <div>
                        <figure class="marceline">
                            <div class="information">
                                <h3>Marceline</h3>
                                <p>A vampira.</p>
                            </div>
                            <img src="./img/marceline.png" alt="Marceline">
                        </figure>
                        <button>Saiba mais</button>
                    </div>
                    <div>
                        <figure class="gelado">
                            <div class="information">
                                <h3>Rei Gelado</h3>
                                <p>Um doido que pensa que é rei.</p>
                            </div>
                            <img src="./img/gelado.png" alt="Princesa Jujuba">
                        </figure>
                        <button>Saiba mais</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="ref">
            <p>Layout adaptado por Henrique para fins exclusivamente educacionais.</p>
            <p>Referência: Layout original dos professores Luan e Leandro.</p>
        </div>
        <figure class="up">
            <a href="#"><img src="./img/up.png" alt="Home"></a>
        </figure>
    </footer>
</body>
</html>
